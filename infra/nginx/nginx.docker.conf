# nginx config for node3.cloud — Docker Compose variant
# Differences from nginx.conf (systemd):
#   • upstream host is "platform:8080" not "127.0.0.1:8080"
#   • static files served from /usr/share/nginx/html (built into image)
#   • TLS cert path is the same (/etc/letsencrypt) — mount it from the host
#
# First-time TLS setup (run on the VM host, not inside Docker):
#   certbot certonly --standalone -d node3.cloud -d www.node3.cloud
# Then restart the nginx container; it will pick up the certs from the volume.

server {
    listen 80;
    server_name node3.cloud www.node3.cloud;

    # ACME challenge for certbot renewal (webroot method).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name node3.cloud www.node3.cloud;

    ssl_certificate     /etc/letsencrypt/live/node3.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/node3.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Slightly generous for WASM uploads; consensus can be large.
    client_max_body_size 25m;

    # ── Platform Go service ──────────────────────────────────────────────────
    # Session-auth API and account management (portal uses these).
    location /api/ {
        proxy_pass         http://platform:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Developer gateway ────────────────────────────────────────────────────
    # API-key-authenticated proxy. The platform validates key + quota then
    # forwards writes to the user's assigned rubixgoplatform node.
    # POST /rubix/v1/tx consensus can take 2-5 minutes.
    location /rubix/ {
        proxy_pass         http://platform:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Lemon Squeezy billing webhooks ───────────────────────────────────────
    # Listed before /api/ so the stricter allow-all here takes precedence.
    location /api/lemon/ {
        proxy_pass         http://platform:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Smart contract callbacks (node → platform) ───────────────────────────
    # In Docker the node container calls this on the platform container directly
    # (http://platform:8080/internal/sc/callback), bypassing nginx entirely.
    # This block is kept for edge cases where traffic arrives via the public IP.
    location /internal/ {
        # Only allow from the node0 container subnet; deny everything else.
        # Update the CIDR if your Docker network uses a different range.
        allow  172.16.0.0/12;
        deny   all;

        proxy_pass         http://platform:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── SvelteKit SPA (adapter-static) ───────────────────────────────────────
    # Static files are baked into the nginx image at build time.
    location / {
        root  /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # index.html must never be cached so the browser picks up new deploys.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Immutable hashed assets: cache aggressively.
    location /_app/immutable/ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
