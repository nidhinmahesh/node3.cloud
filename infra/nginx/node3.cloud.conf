# nginx config for node3.cloud
# TLS terminated here. All upstream communication is plain HTTP over localhost.

server {
    listen 80;
    server_name node3.cloud www.node3.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name node3.cloud www.node3.cloud;

    ssl_certificate     /etc/letsencrypt/live/node3.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/node3.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    root /opt/node3/web;
    index index.html;

    # Platform Go service: session-auth API + account management
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Developer gateway: API-key-authenticated proxy to rubixgoplatform.
    # The platform validates the key + quota, then forwards to the assigned node.
    # Consensus operations (POST /rubix/v1/tx) can take 2-5 min; 300s covers that.
    location /rubix/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Lemon Squeezy billing webhooks — must be reachable from the internet
    # but is listed before /api/ so the allow-all here takes precedence.
    location /api/lemon/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Smart contract callback from rubixgoplatform nodes — localhost only.
    location /internal/ {
        allow 127.0.0.1;
        deny  all;

        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # SvelteKit SPA — adapter-static build, served directly by nginx.
    # Unknown paths fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed immutable assets aggressively; index.html must not be cached.
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Rubix nodes are NOT exposed via nginx.
# They listen on localhost:20000+ only.
# Only the platform service (127.0.0.1:8080) communicates with them.
